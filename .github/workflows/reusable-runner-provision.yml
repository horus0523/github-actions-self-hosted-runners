name: Reusable Runner Provision

on:
  workflow_call:
    inputs:
      environment:
        type: string
        default: dev
      apply:
        type: boolean
        default: false
      runner_user:
        type: string
        default: ubuntu
      tfvars_file:
        type: string
        required: true
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      SSH_PUBLIC_KEY:
        required: false

permissions:
  contents: read

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          repository: ${{ job.workflow_repository }}
          ref: ${{ job.workflow_sha }}
          persist-credentials: false

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e

      - name: Terraform Format Check
        run: terraform fmt -check
        working-directory: .github/terraform/runner-ec2

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: .github/terraform/runner-ec2

      - name: Terraform Validate
        run: terraform validate
        working-directory: .github/terraform/runner-ec2

      - name: Terraform Init For Apply
        if: ${{ inputs.apply }}
        run: terraform init
        working-directory: .github/terraform/runner-ec2

      - name: Terraform Apply
        if: ${{ inputs.apply }}
        run: |
          terraform apply -auto-approve -var-file="${{ inputs.tfvars_file }}"
        working-directory: .github/terraform/runner-ec2
