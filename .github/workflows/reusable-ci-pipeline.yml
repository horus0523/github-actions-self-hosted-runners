name: Reusable CI Pipeline

on:
  workflow_call:
    inputs:
      python_version:
        type: string
        default: '3.12'
      push_image:
        type: boolean
        default: false
    secrets:
      GHCR_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  ci:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        working-directory: src
        run: |
          # Fail if there are serious syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings for the rest of the issues
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        working-directory: src
        run: |
          python -m pytest test.py -v

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build Docker image
        run: |
          IMAGE_TAG=ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .

  publish_gate:
    runs-on: ubuntu-latest
    outputs:
      enabled: ${{ steps.gate.outputs.enabled }}
    steps:
      - id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          PUSH_IMAGE: ${{ inputs.push_image }}
          REF_NAME: ${{ github.ref }}
        run: |
          if [ "$PUSH_IMAGE" = 'true' ] \
            && [ "$EVENT_NAME" = 'push' ] \
            && [ "$REF_NAME" = 'refs/heads/main' ] \
            && [ -n "$GHCR_TOKEN" ]; then
            echo 'enabled=true' >> "$GITHUB_OUTPUT"
          else
            echo 'enabled=false' >> "$GITHUB_OUTPUT"
          fi

  publish_container:
    if: ${{ needs.publish_gate.outputs.enabled == 'true' }}
    needs:
      - ci
      - publish_gate
    runs-on: self-hosted
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5

      - name: Build Docker image
        run: |
          IMAGE_TAG=ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker build -t $IMAGE_TAG .

      - name: Push Docker image
        run: |
          IMAGE_TAG=ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker push $IMAGE_TAG
