name: Python Application CI-CD

on:
  # Keep the self-hosted template manual by default. Do not enable untrusted
  # fork-triggered execution on operator-managed runner hosts.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test_and_build:
    runs-on: self-hosted

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Setup Docker
        run: |
          sudo apt update
          sudo apt install docker.io -y
          sudo systemctl start docker
          sudo systemctl enable docker

      - name: Verify Docker setup
        run: |
          docker --version
          docker info

      - name: Lint with flake8
        working-directory: src
        run: |
          # Fail if there are serious syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings for the rest of the issues
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run tests with pytest
        working-directory: src
        run: |
          python -m pytest test.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ vars.DOCKERHUB_USERNAME }}/mi-app-test:latest
